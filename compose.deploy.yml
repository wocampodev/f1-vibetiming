services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: f1_vibetiming
    volumes:
      - deploy_postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      API_PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/f1_vibetiming?schema=public
      ERGAST_BASE_URL: https://api.jolpi.ca/ergast
    ports:
      - '4000:4000'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    environment:
      F1_API_BASE_URL: http://api:4000/api
      NEXT_PUBLIC_API_BASE_URL: http://api:4000/api
    ports:
      - '3000:3000'

volumes:
  deploy_postgres_data:
