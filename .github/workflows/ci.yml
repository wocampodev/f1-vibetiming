name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: f1_dashboard
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d f1_dashboard"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/f1_dashboard?schema=public

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter api exec prisma generate

      - name: Sync database schema
        run: pnpm --filter api exec prisma db push

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: API e2e tests
        run: pnpm --filter api test:e2e

      - name: Build
        run: pnpm build
