version: 1

project:
  name: f1-vibetiming
  repo_root: .
  local_path: /home/walter/dev/f1-vibetiming
  package_manager: pnpm
  backend: NestJS
  frontend: Next.js

repository:
  url: https://github.com/wocampodev/f1-vibetiming
  visibility: public

runtime:
  live_source_default: provider
  live_source_opt_in:
    - simulator
  standings_source: api.jolpi.ca/ergast

decisions:
  - Keep backend on NestJS
  - Keep pnpm as only package manager
  - Keep product scope to live dashboard and standings
  - Prefer provider-first live runtime without synthetic fallback

artifacts:
  backlog: BACKLOG.md
  handoff: AGENTS.md

ci:
  workflow_file: .github/workflows/ci.yml
  gates:
    - api_test
    - web_lint
    - web_smoke
    - build
