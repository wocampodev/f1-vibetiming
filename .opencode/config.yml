version: 1

project:
  name: f1-vibetiming
  repo_root: .
  local_path: /home/walter/dev/f1-vibetiming
  package_manager: pnpm
  backend: NestJS
  frontend: Next.js

repository:
  url: https://github.com/wocampodev/f1-vibetiming
  visibility: public

runtime:
  local_live_source_default: simulator
  provider_mode_opt_in: LIVE_SOURCE=provider
  standings_source: api.jolpi.ca/ergast

decisions:
  - Keep backend on NestJS
  - Keep pnpm as only package manager
  - Keep product scope to live dashboard and standings
  - Default local runtime to simulator
  - Avoid synthetic fallback behavior in provider mode

artifacts:
  handoff: AGENTS.md
  commands: .opencode/commands.yml

ci:
  workflow_file: .github/workflows/ci.yml
  gates:
    - api_test
    - web_lint
    - web_smoke
    - build
