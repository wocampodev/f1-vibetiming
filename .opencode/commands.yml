version: 1

bootstrap:
  - pnpm install
  - pnpm db:up
  - pnpm --filter api prisma:push

dev:
  - pnpm dev

deploy:
  stack_up: pnpm stack:up
  stack_down: pnpm stack:down

test:
  api_unit: pnpm --filter api test
  api_e2e: pnpm --filter api test:e2e
  web_smoke: pnpm --filter web test:smoke

quality:
  lint: pnpm lint
  build: pnpm build

recommended_resume_flow:
  - pnpm install
  - pnpm db:up
  - pnpm --filter api prisma:push
  - pnpm --filter web test:smoke
  - pnpm --filter api test:e2e
  - pnpm dev
