version: 1

bootstrap:
  - pnpm install
  - docker compose up -d
  - pnpm --filter api prisma:push

dev:
  - pnpm dev

deploy:
  stack_up: docker compose --profile app up -d --build
  stack_up_provider: LIVE_SOURCE=provider docker compose --profile app up -d --build
  stack_down: docker compose --profile app down

test:
  api_unit: pnpm --filter api test
  api_e2e: pnpm --filter api test:e2e
  web_smoke: pnpm --filter web test:smoke

quality:
  lint: pnpm lint
  build: pnpm build

recommended_resume_flow:
  - pnpm install
  - docker compose up -d
  - pnpm --filter api prisma:push
  - pnpm --filter web test:smoke
  - pnpm --filter api test:e2e
  - pnpm dev
