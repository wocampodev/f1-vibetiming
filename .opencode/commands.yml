version: 1

bootstrap:
  - pnpm install
  - docker compose up -d
  - pnpm --filter api prisma:push

dev:
  - pnpm dev

deploy:
  stack_up: docker compose --profile app up -d --build
  stack_up_provider: LIVE_SOURCE=provider docker compose --profile app up -d --build
  stack_up_provider_capture: LIVE_SOURCE=provider LIVE_PROVIDER_CAPTURE_ENABLED=true LIVE_PROVIDER_LOG_FRAMES=true LIVE_PROVIDER_LOG_MESSAGES=true docker compose --profile app up -d --build
  stack_down: docker compose --profile app down
  provider_logs: docker logs -f f1-vibetiming-api
  backup_now: docker exec f1-vibetiming-postgres-backup sh /usr/local/bin/postgres-backup.sh
  provider_capture_inspect: sh scripts/live-provider-inspect.sh
  provider_capture_timingdata: sh scripts/live-provider-inspect.sh TimingData
  provider_capture_export: node scripts/live-provider-export.mjs

test:
  api_unit: pnpm --filter api test
  api_e2e: pnpm --filter api test:e2e
  web_smoke: pnpm --filter web test:smoke

quality:
  lint: pnpm lint
  build: pnpm build

recommended_resume_flow:
  - pnpm install
  - docker compose up -d
  - pnpm --filter api prisma:push
  - pnpm --filter web test:smoke
  - pnpm --filter api test:e2e
  - pnpm dev
